<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <h1>University Registration Form</h1>
    <p>Please fill out the form</p>
    <hr>

    <form> 
        <h2>Personal Details</h2>
        <label for="name">First Name:</label>
        <input type="text" name="name" id="name" placeholder="e.g: Divyansh" required>

        <br><br>

        <label for="surname">Last Name:</label>
        <input type="text" name="surname" id="surname" placeholder="e.g: Mishra">

        <br><br>

        <label for="dob">DOB:</label>
        <input type="date" name="dob" id="dob">
        <br><br>

        <h3>Gender</h3>

    <label for="Male">Male</label>
    <input type="radio" name="gender" id="Male" value="Male">
    <br><br>

    <label for="Female">Female</label>
    <input type="radio" name="gender" id="Female" value="Female">

      <br><br>
    <label for="Other">Other</label>
    <input type="radio" name="gender" id="Other" value="Other">

     <br><br>
     <label>Upload your photo</label>
     <input type="file" name="file">

     <hr>
    <h2>Contact Information:</h2>
  
    <label for="email">Email Address</label>
    <input type="email" name="email" id="email" required>

    <label for="phone">Phone No.</label>
    <input type="tel" name="phone" id="phone" required>

    <br><br>

    <label for="Address">Address</label>
    <br>
    <textarea name="Address" id="Address" required></textarea>

    <hr>

    <h2>Academic Information</h2>
    <label for="course">Select Your Course:</label>
    <select name="course" id="course">
    <option value="BCA">BCA</option>
    <option value="Btech">Btech</option>
    <option value="BSc Cs">BSC CS</option>
</select>
<br>

<h3>EXtra Activity</h3>

<label for="sports">Sports</label>
<input type="checkbox" name="interest" id="interest">
<br><br>


<label for="music">Music</label>
<input type="checkbox" name="interest" id="interest">
<br><br> 

<label for="tech">Technology</label>
<input type="checkbox" name="interest" id="interest">
<br><br>


<label for="voluntering">voluntering</label>
<input type="checkbox" name="interest" id="interest">
<br><br>

<hr>
<h2>Craete your Account</h2>
<label for="pass">Create Password</label>
<input type="password" name="pass" id="pass">
<br><br>

<label for="security">Security answer</label>
<select name="secur" id="secur">
<option value="BCA">What is your favourite color</option>
    <option value="Btech">What is your mobile name</option>
    <option value="BSc Cs">what is your favourite actor</option>
    </select>

<br><br>
<label for="ag">I agree to the Terms and conditions.</label>
<input type="checkbox" name="ag" id="ag">
<br><br>

<hr>

<button type="submit">Register</button>
<button type="reset">Clear form</button>

</form>
</body>
</html>
