<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Nagar Nigam Survey !!</h1>
    <p>Please fill out form</p>
    <hr>

    <form>
        <h2>Personal Details:</h2>
        <label for="name">Name:</label>
        <input type="text">
        <br><br>
        <label for="age">Age:</label>
        <input type="number">
         <br><br>
         <label for="gender">Gender</label>
         <select name="gender" id="gender">
         <option value="Male">Male</option>
         <option value="FEmale">Female</option>
         <option value="Other">Other</option>
         </select>
        <br><br>
        <h3>Address:</h3>
        <label for="state">State:</label>
        <select name="state" id="state">
            <option value="UP">UP</option>
            <option value="Mp">Madhya pradesh</option>
             <option value="gj">Gujrat</option>
              <option value="jk">Jharkhand</option>
               <option>Bihar</option>
                <option>Odisha</option>
        </select>
        <input type="text">
        <br><br>
        <label for="distt">District:</label>
        <select name="up" id="up">
       <option value="kheri">kheri</option>
        <option value="Bareilly">Bareilly</option>
         <option value="Kanpur">Kanpur</option>
        </select>
        <input type="text">
        <br><br>
        <label for="block">Block:</label>
        <input type="text">
        <br><br>
        <label for="village">village:</label>
        <input type="text">
        <label for="mobile">Contact No.:</label>
        <input type="tel">

        <h3>These facilities are available in your Area:</h3>
        <label for="light">Light</label>
        <input type="checkbox">
        <br><br>
        <label for="Water">Water supply</label>
        <input type="checkbox">
        <br><br>
        <label for="colony">Colony</label>
        <input type="checkbox">
        <br><br>
        <label for="ration">Ration</label>
        <input type="checkbox">
        <br><br>
        <label>If any issue write complaint here:</label>
        <input type="text">
        <h4>Are you happy with present govt. or not:</h4>
        <!-- <br><br> -->
        <label>YES</label>
        <input type="radio" name="govt" id="YES" value="YES">
        <br><br>
        <Label>NO</Label>
        <input type="radio" name="govt" id="NO" value="NO">
        <br><br>
        <label>If No,then mention your reason:</label>
        <input type="text">
    </form>

</body>
</html>
